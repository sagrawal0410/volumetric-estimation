mode: object_or_pile
reconstruct_mesh_from_cloud: true
run_poisson: true
run_bpa: false
run_alpha_shape: false

denoise:
  enable_statistical: true
  statistical_nb_neighbors: 30
  statistical_std_ratio: 2.5
  enable_radius: true
  radius_nb_points: 20
  radius_search_m: 0.08
  voxel_downsample_m: 0.005

plane_removal:
  distance_threshold_m: 0.015
  ransac_n: 3
  num_iterations: 2000
  min_plane_inlier_ratio: 0.1

segmentation:
  mode: height_above_plane
  height_above_plane_threshold_m: 0.03

heightfield:
  grid_resolution_m: 0.015
  height_stat: p95
  min_points_per_cell: 2
  hole_fill_method: nearest

voxel:
  voxel_sizes_m: [0.01, 0.015, 0.02, 0.03]

consensus:
  pile_mode: true
  pile_warning: >-
    This estimates visible/bulk envelope volume from the RTAB-Map reconstruction,
    not true hidden material volume.
  estimator_priority:
    - heightfield_volume
    - voxel_occupancy_volume
    - repaired_mesh_volume
    - direct_mesh_volume
    - convex_hull_volume

output:
  save_intermediates: true
  generate_html_report: true
  generate_screenshots: true
  seed: 42
