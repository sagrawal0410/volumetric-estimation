dataset: robi
use_depth_input: false
depth_source: foundation_stereo
voxel_length_m: 0.003
sdf_trunc_m: 0.015
min_depth_m: 0.1
max_depth_m: 2.0
uncertainty:
  run_right_to_left: true
  tau_lr_px: 1.5
  tau_photo: 0.08
  tau_mv_m: 0.005
  k_neighbor_views: 5
  alpha_lr: 2.0
  alpha_photo: 1.0
  alpha_range: 1.0
  alpha_angle: 1.0
  alpha_texture: 0.5
  alpha_sat: 1.0
  alpha_mv: 2.0
  alpha_temp: 1.0
  w_min: 0.01
  w_scale: 5.0
  w_max_per_obs: 5.0
  robust_kernel:
    type: huber
    delta: 0.25
integration:
  W_max: 100.0
  min_weight_for_mesh: 2.0
  use_occupancy: true
  occupancy_threshold: 0.5
